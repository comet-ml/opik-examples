name: Scripts test matrix

permissions:
  contents: read

env:
  PYTHONIOENCODING: utf-8

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
    secrets:
      OPIK_API_KEY:
        required: true

jobs:
  test-scripts:
    runs-on: ${{ inputs.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        scripts: # Add in alphabetical order
          - code-snippets/trace_deletion
          - examples/otel_with_offline_eval_example
          - examples/programmatic_leaderboard_dashboard_creation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Test examples
        uses: nick-fields/retry@v3
        env:
          OPIK_API_KEY: ${{ secrets.OPIK_API_KEY }}
          OPIK_WORKSPACE: ${{ vars.OPIK_WORKSPACE }}
          OPIK_PROJECT_NAME: ${{ vars.OPIK_PROJECT_NAME }}
          OPIK_BASE_URL: "https://www.comet.com"
          OPIK_OTLP_ENDPOINT: "https://www.comet.com/opik/api/v1/private/otel/v1/traces"
        with:
          timeout_minutes: 30
          max_attempts: 2
          command: |
            cd ${{ matrix.scripts }}
            bash run_examples.sh
